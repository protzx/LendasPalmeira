name: Gerar Build do Expo e Enviar para o GitHub

on:
  push:
    branches:
      - main 

jobs:
  build:
    name: Criar Build Android
    runs-on: ubuntu-latest

    steps:
      - name: 🏗️ Baixando o Repositório
        uses: actions/checkout@v4

      - name: ⚙️ Configurando o Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm

      - name: 🛠️ Configurando o EAS e Expo CLI
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: 📦 Instalando Dependências
        run: npm install

      - name: 📱 Gerando a Build Localmente (Android)
        run: eas build --platform android --profile preview --local --non-interactive

      - name: 🚀 Enviando a Build para o GitHub Releases
        uses: softprops/action-gh-release@v2
        with:
          files: |
            build/*.apk
            build/*.aab
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
